<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1923">
<title>Cash Flow Familiar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1923; --surface: #162030; --surface2: #1e2d40;
    --border: #2a3d52; --accent: #3dd6ac; --accent2: #f5a623;
    --red: #e8524a; --text: #e8edf2; --muted: #7a9ab5;
    --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
  }
  html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }

header { padding: 14px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(–border); background: var(–bg); flex-shrink: 0; gap: 8px; }
.logo { font-size: 12px; font-weight: 700; letter-spacing: .12em; color: var(–accent); text-transform: uppercase; }
.month-badge { font-family: var(–mono); font-size: 11px; background: var(–surface2); border: 1px solid var(–border); color: var(–accent2); padding: 4px 10px; border-radius: 20px; letter-spacing: .06em; flex-shrink: 0; }
.sync-indicator { font-family: var(–mono); font-size: 10px; color: var(–muted); display: flex; align-items: center; gap: 4px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(–muted); }
.sync-dot.ok { background: var(–accent); }
.sync-dot.loading { background: var(–accent2); animation: pulse-dot .8s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }

.auth-btn { font-family: var(–mono); font-size: 11px; background: var(–accent); color: var(–bg); border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-weight: 500; transition: opacity .2s; flex-shrink: 0; }
.auth-btn.connected { background: transparent; border: 1px solid var(–border); color: var(–muted); }

#feed { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
#feed::-webkit-scrollbar { width: 3px; }
#feed::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

.msg { max-width: 88%; animation: slideUp .25s ease; display: flex; flex-direction: column; gap: 4px; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.agent { align-self: flex-start; align-items: flex-start; }
.bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
.msg.user .bubble { background: var(–accent); color: var(–bg); border-bottom-right-radius: 4px; font-weight: 500; }
.msg.agent .bubble { background: var(–surface); border: 1px solid var(–border); color: var(–text); border-bottom-left-radius: 4px; }
.msg.agent .bubble.error { border-color: var(–red); color: var(–red); background: rgba(232,82,74,.08); }
.msg.agent .bubble.success { border-color: var(–accent); color: var(–accent); background: rgba(61,214,172,.08); }
.ts { font-family: var(–mono); font-size: 10px; color: var(–muted); padding: 0 4px; }

.confirm-card { background: var(–surface); border: 1px solid var(–accent); border-radius: 16px; padding: 16px; width: 100%; display: flex; flex-direction: column; gap: 12px; }
.confirm-card .label { font-family: var(–mono); font-size: 10px; color: var(–muted); text-transform: uppercase; letter-spacing: .1em; }
.confirm-items { display: flex; flex-direction: column; gap: 8px; }
.confirm-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(–surface2); border-radius: 10px; gap: 8px; }
.confirm-item .concept { font-size: 13px; color: var(–text); flex: 1; }
.confirm-item .amount { font-family: var(–mono); font-size: 14px; color: var(–accent2); font-weight: 500; }
.confirm-item .cat-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(61,214,172,.12); color: var(–accent); font-family: var(–mono); white-space: nowrap; }
.confirm-actions { display: flex; gap: 8px; }
.btn-confirm { flex: 1; padding: 12px; border-radius: 12px; border: none; font-family: var(–sans); font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s; }
.btn-yes { background: var(–accent); color: var(–bg); }
.btn-no { background: var(–surface2); color: var(–muted); border: 1px solid var(–border); }
.btn-no:hover { color: var(–red); border-color: var(–red); }

.typing { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
.typing span { width: 7px; height: 7px; border-radius: 50%; background: var(–muted); animation: bounce .9s infinite; }
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

#input-bar { padding: 12px 16px 20px; border-top: 1px solid var(–border); background: var(–bg); flex-shrink: 0; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
#msg-input { flex: 1; background: var(–surface); border: 1px solid var(–border); color: var(–text); font-family: var(–sans); font-size: 15px; padding: 12px 16px; border-radius: 24px; outline: none; resize: none; max-height: 120px; min-height: 48px; line-height: 1.4; transition: border-color .2s; }
#msg-input::placeholder { color: var(–muted); }
#msg-input:focus { border-color: var(–accent); }
.icon-btn { width: 48px; height: 48px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; flex-shrink: 0; }
#send-btn { background: var(–accent); }
#mic-btn { background: var(–surface2); border: 1px solid var(–border); }
#mic-btn.recording { background: var(–red); border-color: var(–red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(232,82,74,.4)} 50%{box-shadow:0 0 0 8px rgba(232,82,74,0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

#auth-overlay { position: absolute; inset: 0; background: var(–bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 40px 32px; z-index: 100; }
#auth-overlay.hidden { display: none; }
.auth-logo { font-size: 40px; }
.auth-title { font-size: 26px; font-weight: 800; text-align: center; line-height: 1.2; }
.auth-title span { color: var(–accent); }
.auth-desc { font-size: 14px; color: var(–muted); text-align: center; line-height: 1.6; max-width: 300px; }
.auth-big-btn { width: 100%; padding: 16px; border-radius: 16px; background: var(–accent); color: var(–bg); border: none; font-family: var(–sans); font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
.auth-big-btn:hover { opacity: .85; }
.token-input-wrap { width: 100%; display: flex; flex-direction: column; gap: 8px; }
.token-input-wrap label { font-size: 12px; color: var(–muted); font-family: var(–mono); }
.token-input-wrap input { width: 100%; background: var(–surface); border: 1px solid var(–border); color: var(–text); font-family: var(–mono); font-size: 13px; padding: 12px 16px; border-radius: 12px; outline: none; transition: border-color .2s; }
.token-input-wrap input:focus { border-color: var(–accent); }
.token-submit { width: 100%; padding: 14px; border-radius: 12px; background: var(–surface2); color: var(–accent); border: 1px solid var(–accent); font-family: var(–sans); font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s; }
.token-submit:hover { background: var(–accent); color: var(–bg); }
.divider { width: 100%; display: flex; align-items: center; gap: 12px; }
.divider::before, .divider::after { content: ‘’; flex: 1; height: 1px; background: var(–border); }
.divider span { font-size: 11px; color: var(–muted); font-family: var(–mono); }
</style>

</head>
<body>
<div id="app">
  <div id="auth-overlay">
    <div class="auth-logo">🏠</div>
    <div class="auth-title">Cash Flow<br><span>Familiar</span></div>
    <div class="auth-desc">Conectá tu Google Sheet para cargar gastos con voz o texto en segundos.</div>
    <button class="auth-big-btn" onclick="startOAuth()">Conectar con Google</button>
    <div class="divider"><span>o ingresá el token manualmente</span></div>
    <div class="token-input-wrap">
      <label>ACCESS TOKEN</label>
      <input type="text" id="manual-token" placeholder="ya29.xxxxx...">
      <button class="token-submit" onclick="useManualToken()">Usar este token</button>
    </div>
  </div>

  <header>
    <div class="logo">💰 Cash Flow</div>
    <div class="sync-indicator" id="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">—</span>
    </div>
    <div class="month-badge" id="month-display">—</div>
    <button class="auth-btn connected hidden" id="logout-btn" onclick="logout()">Salir</button>
  </header>

  <div id="feed"></div>

  <div id="input-bar">
    <div class="input-row">
      <button class="icon-btn" id="mic-btn" onclick="toggleMic()">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#7a9ab5" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
        </svg>
      </button>
      <textarea id="msg-input" placeholder="Gasté $8500 en verdulería..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="icon-btn" id="send-btn" onclick="sendMessage()">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#0f1923" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SPREADSHEET_ID = '1E85tPc8d00PRteSNDU5j1rmrOngsLtGoTwdb0LpXf8Q';
const CLIENT_ID      = '196093957927-rp1178invth7h94dapt0j73omkiuv0pf.apps.googleusercontent.com';
const CLIENT_SECRET  = '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';
const REDIRECT_URI   = window.location.href.split('?')[0].split('#')[0];
const SCOPES         = 'https://www.googleapis.com/auth/spreadsheets';
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let accessToken  = localStorage.getItem('cf_token') || null;
let pendingItems = [];
let recognition  = null;
let isRecording  = false;
// Dynamic sheet map: { month: [ {row, category, concept} ] }
let sheetData    = {};

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  updateMonthBadge();
  const code = new URLSearchParams(window.location.search).get('code');
  if (code) {
    history.replaceState({}, '', window.location.pathname);
    await exchangeCode(code);
    return;
  }
  if (accessToken) {
    showApp();
    await loadSheetData();
    addAgentMsg('¡Hola! 👋 Planilla cargada. Contame qué gastaste — escribí o hablá.', 'success');
  }
});

function currentMonth() { return MONTHS[new Date().getMonth()]; }
function updateMonthBadge() { document.getElementById('month-display').textContent = currentMonth().toUpperCase(); }

// ── AUTH ──────────────────────────────────────────────────────────────────────
function startOAuth() {
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=${encodeURIComponent(SCOPES)}&access_type=offline&prompt=consent`;
  window.location.href = url;
}
async function exchangeCode(code) {
  try {
    const res  = await fetch('https://oauth2.googleapis.com/token', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: new URLSearchParams({code, client_id:CLIENT_ID, client_secret:CLIENT_SECRET, redirect_uri:REDIRECT_URI, grant_type:'authorization_code'}) });
    const data = await res.json();
    if (data.access_token) {
      accessToken = data.access_token;
      if (data.refresh_token) localStorage.setItem('cf_refresh', data.refresh_token);
      localStorage.setItem('cf_token', accessToken);
      showApp();
      await loadSheetData();
      addAgentMsg('✅ Conectado. Contame qué gastaste.', 'success');
    } else { addAgentMsg('Error al conectar. Intentá de nuevo.', 'error'); }
  } catch(e) { addAgentMsg('Error: ' + e.message, 'error'); }
}
async function refreshToken() {
  const r = localStorage.getItem('cf_refresh');
  if (!r) return false;
  try {
    const res  = await fetch('https://oauth2.googleapis.com/token', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: new URLSearchParams({refresh_token:r, client_id:CLIENT_ID, client_secret:CLIENT_SECRET, grant_type:'refresh_token'}) });
    const data = await res.json();
    if (data.access_token) { accessToken = data.access_token; localStorage.setItem('cf_token', accessToken); return true; }
  } catch(e) {}
  return false;
}
function useManualToken() {
  const t = document.getElementById('manual-token').value.trim();
  if (!t) return;
  accessToken = t; localStorage.setItem('cf_token', t);
  showApp(); loadSheetData();
  addAgentMsg('✅ Token cargado. Contame qué gastaste.', 'success');
}
function showApp() {
  document.getElementById('auth-overlay').classList.add('hidden');
  document.getElementById('logout-btn').classList.remove('hidden');
}
function logout() { localStorage.clear(); location.reload(); }

// ── SHEETS API ────────────────────────────────────────────────────────────────
async function sheetsGet(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}`;
  let res = await fetch(url, { headers:{ Authorization:`Bearer ${accessToken}` } });
  if (res.status === 401) { if (await refreshToken()) res = await fetch(url, { headers:{ Authorization:`Bearer ${accessToken}` } }); }
  return res.json();
}
async function sheetsUpdate(range, values) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`;
  let res = await fetch(url, { method:'PUT', headers:{ Authorization:`Bearer ${accessToken}`, 'Content-Type':'application/json' }, body: JSON.stringify({ range, majorDimension:'ROWS', values }) });
  if (res.status === 401) { if (await refreshToken()) res = await fetch(url, { method:'PUT', headers:{ Authorization:`Bearer ${accessToken}`, 'Content-Type':'application/json' }, body: JSON.stringify({ range, majorDimension:'ROWS', values }) }); }
  return res.json();
}

// ── DYNAMIC SHEET LOADER ──────────────────────────────────────────────────────
function setSyncStatus(state) {
  const dot  = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  if (state === 'loading') { dot.className='sync-dot loading'; text.textContent='Cargando...'; }
  else if (state === 'ok')  { dot.className='sync-dot ok';      text.textContent=currentMonth(); }
  else                       { dot.className='sync-dot';         text.textContent='Sin conexión'; }
}

async function loadSheetData(month) {
  month = month || currentMonth();
  setSyncStatus('loading');
  try {
    // Read cols A and B up to row 200
    const data = await sheetsGet(`${month}!A1:B200`);
    if (!data.values) { setSyncStatus('error'); return; }

    sheetData[month] = [];

    // Known categories in the sheet
    const KNOWN_CATS = [
      'Servicios','Alimentación','Personal doméstico','Rodados','Salud',
      'Educación','Esparcimiento','Vida Social','Bancos / AFIP','Sueldos personales'
    ];
    // Known section headers to skip
    const SKIP_CONCEPTS = [
      'CONCEPTO','PRESUP. ARS','GASTOS FIJOS','OBLIGACIÓN FINANCIERA',
      'GASTOS EXTRAORDINARIOS','META DE AHORRO MENSUAL','INGRESOS','BALANCE DEL MES',
      'Subtotal','TOTAL','TC:','Arreglos','Cumples','Familia completa',
      'Restoranes','Copagos','Todo lo que','descripción','Descripción'
    ];

    data.values.forEach((row, idx) => {
      const cat     = (row[0] || '').trim();
      const concept = (row[1] || '').trim();
      if (!concept || !cat) return;
      // Skip if concept looks like a number or formula result
      if (/^[\d,.$()U\s-]+$/.test(concept)) return;
      // Skip known section headers
      if (SKIP_CONCEPTS.some(s => concept.includes(s) || cat.includes(s))) return;
      // For gastos extraordinarios: col A has the rubro, col B has description — we want col A as concept
      // Accept rows where cat is a known category OR where it looks like a valid category name
      const isKnownCat = KNOWN_CATS.some(k => cat.includes(k));
      if (!isKnownCat) {
        // Could be an extraordinario where A=rubro, B=description
        // In that case push with cat as concept and 'Extraordinarios' as category
        if (cat.length > 2 && cat.length < 50 && !SKIP_CONCEPTS.some(s => cat.includes(s))) {
          sheetData[month].push({ row: idx + 1, category: 'Extraordinarios', concept: cat });
        }
        return;
      }
      sheetData[month].push({ row: idx + 1, category: cat, concept: concept });
    });

    // Deduplicate by concept name
    const seen = new Set();
    sheetData[month] = sheetData[month].filter(r => {
      if (seen.has(r.concept)) return false;
      seen.add(r.concept); return true;
    });

    setSyncStatus('ok');
    console.log(`Loaded ${sheetData[month].length} concepts for ${month}:`, sheetData[month].map(r => r.concept));
  } catch(e) {
    setSyncStatus('error');
    console.error('Error loading sheet', e);
  }
}

// ── CLAUDE AI CATEGORIZER ─────────────────────────────────────────────────────
async function categorizeWithClaude(userText, month) {
  const concepts = (sheetData[month] || []).map(r => `"${r.concept}" (${r.category})`).join(', ');

  const prompt = `Sos un asistente de finanzas personales argentino. El usuario dice: "${userText}"

Los conceptos disponibles en la planilla son: ${concepts}

Identificá todos los gastos mencionados. Para cada gasto devolvé un JSON array con objetos que tengan:
- "concept": el nombre EXACTO del concepto de la planilla (copialo tal cual)
- "amount": el monto en pesos (número sin símbolos)
- "raw": el fragmento original del texto

Si un gasto no coincide con ningún concepto, usá "concept": null.
Si no hay gastos, devolvé [].

Respondé SOLO con el JSON array, sin texto adicional, sin markdown.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 500,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  const text = data.content?.[0]?.text || '[]';
  try {
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch(e) {
    console.error('Parse error:', text);
    return [];
  }
}

// ── FIND ROW IN SHEET ─────────────────────────────────────────────────────────
function findRow(month, conceptName) {
  const rows = sheetData[month] || [];
  // Exact match first
  let found = rows.find(r => r.concept.toLowerCase() === conceptName.toLowerCase());
  if (found) return found;
  // Partial match
  found = rows.find(r => r.concept.toLowerCase().includes(conceptName.toLowerCase()) ||
                          conceptName.toLowerCase().includes(r.concept.toLowerCase()));
  return found || null;
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function escHtml(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addUserMsg(text) {
  const now = new Date();
  const ts  = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  document.getElementById('feed').innerHTML += `<div class="msg user"><div class="bubble">${escHtml(text)}</div><div class="ts">${ts}</div></div>`;
  scrollFeed();
}
function addAgentMsg(text, type='') {
  document.getElementById('feed').innerHTML += `<div class="msg agent"><div class="bubble ${type}">${text}</div></div>`;
  scrollFeed();
}
function showTyping() {
  document.getElementById('feed').innerHTML += `<div class="msg agent" id="typing"><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  scrollFeed();
}
function hideTyping() { document.getElementById('typing')?.remove(); }
function scrollFeed() { const f = document.getElementById('feed'); f.scrollTop = f.scrollHeight; }

function showConfirmCard(items, month) {
  const itemsHtml = items.map(item => `
    <div class="confirm-item">
      <div style="display:flex;flex-direction:column;gap:2px;flex:1">
        <span class="concept">${escHtml(item.concept)}</span>
        <span class="cat-tag">${escHtml(item.category || '')}</span>
      </div>
      <span class="amount">$${Number(item.amount).toLocaleString('es-AR')}</span>
    </div>`).join('');
  const cardId = 'confirm-' + Date.now();
  document.getElementById('feed').innerHTML += `
    <div class="msg agent" id="${cardId}">
      <div class="confirm-card">
        <div class="label">📋 ${month} — Confirmar carga</div>
        <div class="confirm-items">${itemsHtml}</div>
        <div class="confirm-actions">
          <button class="btn-confirm btn-yes" onclick="confirmItems('${cardId}','${month}')">✓ Sí, cargar</button>
          <button class="btn-confirm btn-no" onclick="cancelItems('${cardId}')">✕ Cancelar</button>
        </div>
      </div>
    </div>`;
  scrollFeed();
  pendingItems = items;
}

async function confirmItems(cardId, month) {
  document.getElementById(cardId)?.remove();
  if (!pendingItems.length) return;
  showTyping();
  const successes = [], errors = [];

  for (const item of pendingItems) {
    const found = findRow(month, item.concept);
    if (!found) { errors.push(`No encontré la fila de "${item.concept}"`); continue; }
    const range = `${month}!D${found.row}`;
    try {
      const cur     = await sheetsGet(range);
      const curVal  = parseFloat((cur.values?.[0]?.[0] || '0').toString().replace(/[^0-9.-]/g,'')) || 0;
      const newVal  = curVal + Number(item.amount);
      await sheetsUpdate(range, [[newVal]]);
      successes.push(`${item.concept}: $${Number(item.amount).toLocaleString('es-AR')}${curVal > 0 ? ` → total $${newVal.toLocaleString('es-AR')}` : ''}`);
    } catch(e) { errors.push(`Error en ${item.concept}: ${e.message}`); }
  }

  hideTyping();
  if (successes.length) addAgentMsg('✅ Cargado:<br>' + successes.map(s=>`• ${s}`).join('<br>'), 'success');
  if (errors.length)    addAgentMsg('⚠️ ' + errors.join('<br>'), 'error');
  pendingItems = [];
}

function cancelItems(cardId) {
  document.getElementById(cardId)?.remove();
  pendingItems = [];
  addAgentMsg('Cancelado. ¿Qué más necesitás?');
}


// ── FALLBACK KEYWORD PARSER ───────────────────────────────────────────────────
function fallbackParse(text, month) {
  const concepts = sheetData[month] || [];
  const norm = t => t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const results = [];

  // Extract amounts
  const amountRe = /\$\s*([\d.,]+)/g;
  const amounts = [];
  let m;
  while ((m = amountRe.exec(text)) !== null) {
    const raw = m[1].replace(/\./g,'').replace(',','.');
    const val = parseFloat(raw);
    if (val > 0) amounts.push({ val, index: m.index });
  }
  if (!amounts.length) return [];

  // Try to match each amount to a concept
  const normText = norm(text);
  for (const concept of concepts) {
    const normConcept = norm(concept.concept);
    // Check if any word of the concept appears in the text
    const words = normConcept.split(/[\s\/]+/).filter(w => w.length > 3);
    const matched = words.some(w => normText.includes(w));
    if (matched) {
      // Find nearest amount
      const amount = amounts[0]?.val;
      if (amount) {
        results.push({ concept: concept.concept, amount, raw: text });
        break;
      }
    }
  }
  return results;
}

// ── MAIN FLOW ─────────────────────────────────────────────────────────────────
async function processInput(text) {
  if (!text.trim()) return;
  addUserMsg(text);
  showTyping();

  if (!accessToken) {
    hideTyping();
    addAgentMsg('Primero conectá tu Google Sheet.', 'error');
    return;
  }

  // Detect month override
  const norm       = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const monthNames = MONTHS.map(m => m.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
  let targetMonth  = currentMonth();
  monthNames.forEach((mn, i) => { if (norm.includes(mn)) targetMonth = MONTHS[i]; });

  // Ensure sheet data loaded for target month
  if (!sheetData[targetMonth]) await loadSheetData(targetMonth);

  // Check if it's a question
  if (norm.match(/\b(cuanto|total|gastamos|saldo|balance|cuánto)\b/)) {
    hideTyping();
    addAgentMsg('Para consultar saldos abrí la planilla directamente. Yo cargo gastos. 😊');
    return;
  }

  // Use Claude to parse and categorize, with keyword fallback
  let parsed = [];
  try {
    parsed = await categorizeWithClaude(text, targetMonth);
  } catch(e) {
    console.error('Claude API error:', e);
  }

  // Fallback: if Claude failed or returned nothing, try simple keyword+amount parse
  if (!parsed.length) {
    parsed = fallbackParse(text, targetMonth);
  }

  hideTyping();

  // Debug: show what was loaded
  const loadedConcepts = (sheetData[targetMonth] || []).map(r => r.concept);
  console.log('Parsed by Claude:', parsed);
  console.log('Loaded concepts:', loadedConcepts);

  if (!parsed.length) {
    if (!loadedConcepts.length) {
      addAgentMsg('⚠️ No pude leer la planilla. Intentá cerrar y abrir la app de nuevo.', 'error');
    } else {
      addAgentMsg('No entendí el gasto. Los conceptos disponibles son:<br>' + loadedConcepts.map(c=>`• ${c}`).join('<br>'));
    }
    return;
  }

  // Enrich with category from sheet data
  const items = parsed.map(p => {
    const found = p.concept ? findRow(targetMonth, p.concept) : null;
    return {
      concept:  found ? found.concept : (p.concept || '¿?'),
      category: found ? found.category : 'Sin categoría',
      amount:   p.amount,
      raw:      p.raw,
      matched:  !!found
    };
  });

  const unmatched = items.filter(i => !i.matched);
  if (unmatched.length) {
    const names = (sheetData[targetMonth] || []).map(r => r.concept).join(', ');
    addAgentMsg(`No encontré en la planilla: "${unmatched.map(u=>u.concept||u.raw).join('", "')}". Los conceptos disponibles son: ${names}`);
    return;
  }

  if (targetMonth !== currentMonth()) {
    addAgentMsg(`Cargando en <strong>${targetMonth}</strong> (no en el mes actual).`);
  }

  showConfirmCard(items, targetMonth);
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function sendMessage() {
  const inp = document.getElementById('msg-input');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = ''; inp.style.height = '';
  processInput(txt);
}
function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

// ── VOICE ─────────────────────────────────────────────────────────────────────
function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    addAgentMsg('Voz no disponible en este navegador. Usá Chrome o Safari.', 'error'); return;
  }
  isRecording ? stopMic() : startMic();
}
function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'es-AR'; recognition.continuous = false; recognition.interimResults = false;
  recognition.onresult = e => processInput(e.results[0][0].transcript);
  recognition.onerror  = e => { addAgentMsg('Error de voz: ' + e.error, 'error'); stopMic(); };
  recognition.onend    = () => stopMic();
  recognition.start();
  isRecording = true;
  document.getElementById('mic-btn').classList.add('recording');
  document.getElementById('mic-btn').querySelector('svg').setAttribute('stroke','white');
}
function stopMic() {
  recognition?.stop(); isRecording = false;
  const btn = document.getElementById('mic-btn');
  btn.classList.remove('recording');
  btn.querySelector('svg').setAttribute('stroke','#7a9ab5');
}
</script>
